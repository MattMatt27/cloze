<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Cloze</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'page':          '#FAF9F7',
            'cloze-indigo':  '#5B5FC7',
            'cloze-hover':   '#4E51B0',
            'cloze-lavender':'#EEEAF6',
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-[#EEEAF6] flex items-center justify-center p-4 antialiased">

  <div class="w-full max-w-sm">
    {# Logo + title #}
    <div class="mb-8 text-center">
      <img src="/static/images/logo.svg" alt="Cloze" class="mx-auto mb-1 h-20 w-20">
      <h1 class="text-xl font-semibold text-stone-900">Sign in to Cloze</h1>
      <p class="mt-1 text-sm text-stone-500">Select your role and sign in</p>
    </div>

    {# Card #}
    <div class="rounded-lg border border-stone-200 bg-white p-6">

      {# Role selector #}
      <div class="mb-6 flex gap-1 rounded-md bg-stone-100 p-1">
        <button type="button" class="role-btn flex-1 rounded-md px-3 py-2 text-sm font-medium transition"
                data-role="user" onclick="selectRole('user')">
          Participant
        </button>
        <button type="button" class="role-btn flex-1 rounded-md px-3 py-2 text-sm font-medium transition"
                data-role="provider" onclick="selectRole('provider')">
          Provider
        </button>
      </div>

      {# Error #}
      <div id="errorMessage"
           class="mb-4 hidden rounded-md bg-red-50 px-3 py-2.5 text-sm text-red-700 ring-1 ring-inset ring-red-200">
      </div>

      {# Form #}
      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label for="username" class="mb-1.5 block text-sm font-medium text-stone-700">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username"
                 class="w-full rounded-md border border-stone-300 bg-white px-3 py-2 text-sm text-stone-900 outline-none transition placeholder:text-stone-400 focus:border-cloze-indigo focus:ring-1 focus:ring-cloze-indigo">
        </div>

        <div>
          <label for="password" class="mb-1.5 block text-sm font-medium text-stone-700">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
                 class="w-full rounded-md border border-stone-300 bg-white px-3 py-2 text-sm text-stone-900 outline-none transition placeholder:text-stone-400 focus:border-cloze-indigo focus:ring-1 focus:ring-cloze-indigo">
        </div>

        <button type="submit" id="loginBtn"
                class="w-full rounded-md bg-[#312E81] px-4 py-2.5 text-sm font-medium text-white transition hover:bg-[#3D3A94] disabled:opacity-50 disabled:cursor-not-allowed">
          Sign in as Participant
        </button>
      </form>
    </div>
  </div>

  <script>
    let selectedRole = 'user';

    function selectRole(role) {
      selectedRole = role;

      document.querySelectorAll('.role-btn').forEach(function (btn) {
        var isActive = btn.getAttribute('data-role') === role;
        btn.classList.toggle('bg-white', isActive);
        btn.classList.toggle('text-stone-900', isActive);
        btn.classList.toggle('shadow-sm', isActive);
        btn.classList.toggle('text-stone-500', !isActive);
      });

      var label = role === 'user' ? 'Participant' : 'Provider';
      document.getElementById('loginBtn').textContent = 'Sign in as ' + label;
    }

    // Init default state
    selectRole('user');

    async function handleLogin(event) {
      event.preventDefault();

      var errorDiv = document.getElementById('errorMessage');
      var loginBtn = document.getElementById('loginBtn');

      errorDiv.classList.add('hidden');
      loginBtn.disabled = true;

      var formData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };

      try {
        var response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        var data = await response.json();

        if (response.ok) {
          if (data.role !== selectedRole) {
            errorDiv.textContent = 'This account has the ' + data.role + ' role, not ' + selectedRole;
            errorDiv.classList.remove('hidden');
            loginBtn.disabled = false;
            return;
          }
          window.location.href = data.redirect;
        } else {
          errorDiv.textContent = data.message || 'Invalid credentials';
          errorDiv.classList.remove('hidden');
          loginBtn.disabled = false;
        }
      } catch (e) {
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.classList.remove('hidden');
        loginBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
